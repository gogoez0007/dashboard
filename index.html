<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Tambak Pro - Hybrid Load</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans text-slate-900">

    <div class="max-w-7xl mx-auto">
        <!-- Dashboard Header -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-8">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-lg text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M0 13a1.5 1.5 0 0 0 1.5 1.5h13A1.5 1.5 0 0 0 16 13V6a1.5 1.5 0 0 0-1.5-1.5h-13A1.5 1.5 0 0 0 0 6v7zM2 3a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 0-1h-11A.5.5 0 0 0 2 3zm2-2a.5.5 0 0 0 .5.5h7a.5.5 0 0 0 0-1h-7A.5.5 0 0 0 4 1z"/></svg>
                    </div>
                    <h1 class="text-xl font-black uppercase tracking-tighter">Monitoring Kualitas Air</h1>
                </div>
                <div id="fileStatus" class="text-[10px] font-bold px-4 py-1.5 rounded-full bg-slate-100 text-slate-400 uppercase tracking-widest">
                    Inisialisasi...
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- TOMBOL UPLOAD MANUAL KEMBALI LAGI -->
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase text-blue-600 ml-1">1. Upload/Ganti File Excel</label>
                    <input type="file" id="uploadManual" accept=".xlsx, .xls" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-slate-100 rounded-xl bg-slate-50 p-1 cursor-pointer">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">2. Pilih Siklus</label>
                    <select id="siklusFilter" class="w-full p-3 bg-slate-50 border-0 rounded-xl font-bold text-blue-700 focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer"></select>
                </div>
                
                <div class="space-y-1">
                    <label class="text-[10px] font-bold uppercase text-slate-400 ml-1">3. Pilih Parameter</label>
                    <select id="paramFilter" class="w-full p-3 bg-slate-50 border-0 rounded-xl font-bold text-slate-700 focus:ring-2 focus:ring-blue-500 transition-all cursor-pointer">
                        <option value="PH.1">PH.1</option>
                        <option value="SAL">SAL (Salinitas)</option>
                        <option value="NO2">NO2 (Nitrit)</option>
                        <option value="ALK">ALK (Alkalinitas)</option>
                        <option value="TOM">TOM</option>
                        <option value="MG">MG (Magnesium)</option>
                        <option value="CA">CA (Kalsium)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Main Dashboard Area -->
        <div id="dashboardContainer" class="hidden space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Timeline Chart -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6 italic">📈 Timeline Pergerakan Harian</h2>
                    <div class="h-[450px]">
                        <canvas id="lineChart"></canvas>
                    </div>
                </div>

                <!-- Cycle Bar Chart -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6 text-center italic">📊 Rata-rata Per Siklus</h2>
                    <div class="h-[450px]">
                        <canvas id="barChartSiklus"></canvas>
                    </div>
                </div>
            </div>

            <!-- Tables Section -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 pb-20">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-sm font-bold text-blue-600 uppercase tracking-widest mb-4">Summary Pond (Siklus Aktif)</h3>
                    <div id="tablePond" class="overflow-x-auto"></div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="text-sm font-bold text-slate-800 uppercase tracking-widest mb-4 text-center">Summary Antar Siklus</h3>
                    <div id="tableSiklus" class="overflow-x-auto"></div>
                </div>
            </div>
        </div>

        <!-- Fallback Message -->
        <div id="errorArea" class="py-40 text-center bg-white rounded-2xl border-2 border-dashed border-slate-200">
            <p class="text-slate-400 font-medium italic">Silakan upload file Excel menggunakan tombol di atas untuk memulai.</p>
        </div>
    </div>

    <script>
        Chart.register(ChartDataLabels);
        let rawData = [];
        let lineChart, barChartSiklus;

        // SISTEM AUTO-LOAD
        window.onload = async () => {
            try {
                const res = await fetch('./Book1.xlsx'); 
                if (!res.ok) throw new Error("Auto-load failed");
                const buf = await res.arrayBuffer();
                processWorkbook(buf);
                updateStatus("Data Otomatis: Book1.xlsx", "bg-green-100", "text-green-600");
            } catch (e) {
                updateStatus("Menunggu File Manual...", "bg-slate-100", "text-slate-400");
            }
        };

        // SISTEM UPLOAD MANUAL
        document.getElementById('uploadManual').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                processWorkbook(ev.target.result);
                updateStatus(`File Manual: ${file.name}`, "bg-blue-100", "text-blue-600");
            };
            reader.readAsArrayBuffer(file);
        };

        document.getElementById('siklusFilter').onchange = updateView;
        document.getElementById('paramFilter').onchange = updateView;

        function updateStatus(msg, bg, txt) {
            const status = document.getElementById('fileStatus');
            status.innerText = msg;
            status.className = `text-[10px] font-bold px-4 py-1.5 rounded-full uppercase tracking-widest ${bg} ${txt}`;
        }

        function processWorkbook(buffer) {
            const wb = XLSX.read(new Uint8Array(buffer), { type: 'array', cellDates: true });
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            rawData = data.map(r => {
                let obj = {};
                for (let k in r) {
                    let key = k.trim().toUpperCase();
                    let val = r[k];
                    if (typeof val === 'string' && !isNaN(parseFloat(val.replace(',', '.')))) {
                        val = parseFloat(val.replace(',', '.'));
                    }
                    obj[key] = val;
                }
                return obj;
            });

            if (rawData.length > 0) {
                const uniqueS = [...new Set(rawData.map(d => d.SIKLUS))].filter(Boolean);
                document.getElementById('siklusFilter').innerHTML = uniqueS.map(s => `<option value="${s}">${s}</option>`).join('');
                document.getElementById('dashboardContainer').classList.remove('hidden');
                document.getElementById('errorArea').classList.add('hidden');
                updateView();
            }
        }

        function updateView() {
            const selSiklus = document.getElementById('siklusFilter').value;
            const selParam = document.getElementById('paramFilter').value.toUpperCase();

            const filtered = rawData.filter(d => String(d.SIKLUS) === selSiklus);
            const ponds = [...new Set(filtered.map(d => d.POND))];

            // 1. TIMELINE LINE CHART (Sumbu Y Lega + Labelist)
            const ds = ponds.map((p, i) => {
                const pData = filtered.filter(r => r.POND === p).sort((a,b) => new Date(a.DATE) - new Date(b.DATE));
                const colors = ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'];
                return {
                    label: `Pond ${p}`,
                    data: pData.map(r => ({ x: formatTgl(r.DATE), y: r[selParam] })),
                    borderColor: colors[i % colors.length],
                    backgroundColor: colors[i % colors.length],
                    tension: 0.15,
                    pointRadius: 5
                };
            });

            if(lineChart) lineChart.destroy();
            lineChart = new Chart(document.getElementById('lineChart'), {
                type: 'line',
                data: { datasets: ds },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' },
                        datalabels: {
                            display: true,
                            align: 'top',
                            offset: 10,
                            font: { weight: 'bold', size: 10 },
                            formatter: (v) => v.y || ""
                        }
                    },
                    scales: {
                        x: { offset: true },
                        y: { grace: '30%', beginAtZero: false } // Space Lega Sumbu Y
                    }
                }
            });

            // 2. BAR CHART
            const allS = [...new Set(rawData.map(d => d.SIKLUS))].filter(Boolean);
            const avgs = allS.map(s => {
                const r = rawData.filter(d => d.SIKLUS === s);
                return (r.reduce((a, b) => a + (parseFloat(b[selParam]) || 0), 0) / r.length).toFixed(2);
            });

            if(barChartSiklus) barChartSiklus.destroy();
            barChartSiklus = new Chart(document.getElementById('barChartSiklus'), {
                type: 'bar',
                data: {
                    labels: allS,
                    datasets: [{
                        label: `Avg ${selParam}`,
                        data: avgs,
                        backgroundColor: allS.map(s => s === selSiklus ? '#2563eb' : '#e2e8f0'),
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { datalabels: { anchor: 'end', align: 'top' } },
                    scales: { y: { grace: '15%' } }
                }
            });

            drawTables(filtered, selSiklus);
        }

        function drawTables(filtered, activeS) {
            const cols = ['PH.1', 'SAL', 'ALK', 'TOM', 'MG', 'CA'];
            
            // Pond Table
            let pRows = [...new Set(filtered.map(d => d.POND))].map(p => {
                const r = filtered.filter(row => row.POND === p);
                let cells = `<td class="p-3 border font-bold text-slate-800">${p}</td>`;
                cols.forEach(c => {
                    const v = r.reduce((a, b) => a + (parseFloat(b[c]) || 0), 0) / r.length;
                    cells += `<td class="p-3 border text-center font-mono">${v.toFixed(2)}</td>`;
                });
                return `<tr>${cells}</tr>`;
            }).join('');
            document.getElementById('tablePond').innerHTML = `<table class="w-full text-[11px] border">
                <thead class="bg-slate-50 text-slate-400"><tr><th class="p-3 border font-bold uppercase">Pond</th>${cols.map(c=>`<th class="p-3 border font-bold text-center">${c}</th>`).join('')}</tr></thead>
                <tbody>${pRows}</tbody></table>`;

            // Comparison Table
            const allS = [...new Set(rawData.map(d => d.SIKLUS))].filter(Boolean);
            let sRows = allS.map(s => {
                const r = rawData.filter(row => row.SIKLUS === s);
                let cells = `<td class="p-3 border">${s}</td>`;
                cols.forEach(c => {
                    const v = r.reduce((a, b) => a + (parseFloat(b[c]) || 0), 0) / r.length;
                    cells += `<td class="p-3 border text-center font-mono">${v.toFixed(2)}</td>`;
                });
                return `<tr class="${s === activeS ? 'bg-blue-50 font-black' : ''}">${cells}</tr>`;
            }).join('');
            document.getElementById('tableSiklus').innerHTML = `<table class="w-full text-[11px] border">
                <thead class="bg-slate-800 text-white"><tr><th class="p-3 border uppercase font-bold tracking-widest">Siklus</th>${cols.map(c=>`<th class="p-3 border font-bold text-center">${c} (Avg)</th>`).join('')}</tr></thead>
                <tbody>${sRows}</tbody></table>`;
        }

        function formatTgl(val) {
            if (!val) return "";
            if (val instanceof Date) return val.toLocaleDateString('id-ID', { day:'2-digit', month:'short' });
            return val;
        }
    </script>
</body>
</html>
