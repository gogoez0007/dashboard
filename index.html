<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Tambak Vercel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6 border-t-4 border-blue-600">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-xl font-black text-slate-800 tracking-tight uppercase">📊 Monitoring Tambak (Vercel Live)</h1>
                <div id="statusLoad" class="text-[10px] font-bold px-3 py-1 rounded-full bg-blue-100 text-blue-600 tracking-wider uppercase">
                    Initializing...
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-slate-50 p-2 border rounded-lg">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Ganti File Excel</label>
                    <input type="file" id="uploadFile" accept=".xlsx, .xls" class="text-xs w-full">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 font-sans">Pilih Siklus</label>
                    <select id="siklusFilter" class="w-full p-2 border border-slate-300 rounded-md font-bold text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 font-sans">Pilih Parameter</label>
                    <select id="paramFilter" class="w-full p-2 border border-slate-300 rounded-md font-bold text-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="PH.1">PH.1</option>
                        <option value="SAL">SAL (Salinitas)</option>
                        <option value="NO2">NO2</option>
                        <option value="ALK">ALK (Alkalinitas)</option>
                        <option value="TOM">TOM</option>
                        <option value="MG">MG (Magnesium)</option>
                        <option value="CA">CA (Calsium)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Dashboard Content -->
        <div id="dashboardArea" class="hidden space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Timeline -->
                <div class="bg-white p-6 rounded-xl shadow-md border border-slate-200">
                    <h2 class="text-md font-bold text-slate-800 mb-4 border-b pb-2">📈 Timeline Pergerakan Harian</h2>
                    <div class="h-[450px]"><canvas id="lineChart"></canvas></div>
                </div>
                <!-- Bar Chart -->
                <div class="bg-white p-6 rounded-xl shadow-md border border-slate-200 text-center">
                    <h2 class="text-md font-bold text-slate-800 mb-4 border-b pb-2">⚖️ Rata-rata Per Siklus</h2>
                    <div class="h-[450px]"><canvas id="barChartSiklus"></canvas></div>
                </div>
            </div>

            <!-- Summary Tables -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 pb-12">
                <div class="bg-white p-5 rounded-xl shadow border border-slate-200">
                    <h3 class="font-bold mb-3 text-blue-600 uppercase text-xs">Summary Pond (Siklus Terpilih)</h3>
                    <div id="tablePondWrap" class="overflow-auto max-h-[400px]"></div>
                </div>
                <div class="bg-white p-5 rounded-xl shadow border border-slate-200 text-center">
                    <h3 class="font-bold mb-3 text-slate-700 uppercase text-xs">Perbandingan Antar Siklus</h3>
                    <div id="tableSiklusWrap" class="overflow-auto max-h-[400px]"></div>
                </div>
            </div>
        </div>

        <div id="emptyState" class="py-40 text-center bg-white rounded-xl border-2 border-dashed border-slate-200 hidden">
            <p class="text-slate-400">File default tidak ditemukan. Silakan upload manual.</p>
        </div>
    </div>

    <script>
        Chart.register(ChartDataLabels);
        let rawData = [];
        let lineChart, barChartSiklus;

        // LOAD OTOMATIS DARI VERCEL SERVER
        window.addEventListener('DOMContentLoaded', () => {
            fetch('./Book1.xlsx')
                .then(res => {
                    if(!res.ok) throw new Error("File not found");
                    return res.arrayBuffer();
                })
                .then(buf => {
                    processData(buf);
                    document.getElementById('statusLoad').innerText = "Book1.xlsx Loaded";
                    document.getElementById('statusLoad').className = "text-[10px] font-bold px-3 py-1 rounded-full bg-green-100 text-green-600";
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('statusLoad').innerText = "Gagal Load Default";
                    document.getElementById('statusLoad').className = "text-[10px] font-bold px-3 py-1 rounded-full bg-red-100 text-red-600";
                    document.getElementById('emptyState').classList.remove('hidden');
                });
        });

        document.getElementById('uploadFile').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => processData(ev.target.result);
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        document.getElementById('siklusFilter').addEventListener('change', updateUI);
        document.getElementById('paramFilter').addEventListener('change', updateUI);

        function processData(buffer) {
            const wb = XLSX.read(new Uint8Array(buffer), { type: 'array', cellDates: true });
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
            
            rawData = data.map(r => {
                let obj = {};
                for (let k in r) {
                    let key = k.trim().toUpperCase();
                    let val = r[k];
                    if (typeof val === 'string' && !isNaN(parseFloat(val.replace(',', '.')))) val = parseFloat(val.replace(',', '.'));
                    obj[key] = val;
                }
                return obj;
            });

            if (rawData.length > 0) {
                const uniqueS = [...new Set(rawData.map(d => d.SIKLUS))].filter(Boolean);
                document.getElementById('siklusFilter').innerHTML = uniqueS.map(s => `<option value="${s}">${s}</option>`).join('');
                document.getElementById('dashboardArea').classList.remove('hidden');
                document.getElementById('emptyState').classList.add('hidden');
                updateUI();
            }
        }

        function updateUI() {
            const selSiklus = document.getElementById('siklusFilter').value;
            const selParam = document.getElementById('paramFilter').value.toUpperCase();

            const filtered = rawData.filter(d => String(d.SIKLUS) === selSiklus);
            const ponds = [...new Set(filtered.map(d => d.POND))];

            // LINE CHART
            const ds = ponds.map((p, i) => {
                const rows = filtered.filter(r => r.POND === p).sort((a,b) => new Date(a.DATE) - new Date(b.DATE));
                const colors = ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'];
                return {
                    label: `Pond ${p}`,
                    data: rows.map(r => ({ x: formatTgl(r.DATE), y: r[selParam] })),
                    borderColor: colors[i % colors.length],
                    backgroundColor: colors[i % colors.length],
                    tension: 0.1,
                    pointRadius: 5
                };
            });

            if(lineChart) lineChart.destroy();
            lineChart = new Chart(document.getElementById('lineChart'), {
                type: 'line',
                data: { datasets: ds },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        datalabels: { display: true, align: 'top', offset: 8, font: { weight: 'bold', size: 10 }, formatter: (v) => v.y || "" }
                    },
                    scales: { x: { offset: true }, y: { grace: '25%', beginAtZero: false } }
                }
            });

            // BAR CHART
            const allS = [...new Set(rawData.map(d => d.SIKLUS))].filter(Boolean);
            const avgs = allS.map(s => {
                const r = rawData.filter(d => d.SIKLUS === s);
                return (r.reduce((a, b) => a + (parseFloat(b[selParam]) || 0), 0) / r.length).toFixed(2);
            });

            if(barChartSiklus) barChartSiklus.destroy();
            barChartSiklus = new Chart(document.getElementById('barChartSiklus'), {
                type: 'bar',
                data: {
                    labels: allS,
                    datasets: [{ label: `Avg ${selParam}`, data: avgs, backgroundColor: allS.map(s => s === selSiklus ? '#2563eb' : '#cbd5e1') }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { datalabels: { display: true, anchor: 'end', align: 'top' } },
                    scales: { y: { grace: '15%' } }
                }
            });

            renderTables(filtered, selSiklus);
        }

        function renderTables(filtered, activeS) {
            const cols = ['PH.1', 'SAL', 'ALK', 'TOM', 'MG', 'CA'];
            
            // Pond Summary
            let pBody = [...new Set(filtered.map(d => d.POND))].map(p => {
                const r = filtered.filter(row => row.POND === p);
                let row = `<td class="p-2 border font-bold text-slate-800 text-left">${p}</td>`;
                cols.forEach(c => {
                    const v = r.reduce((a, b) => a + (parseFloat(b[c]) || 0), 0) / r.length;
                    row += `<td class="p-2 border text-center font-mono">${v.toFixed(2)}</td>`;
                });
                return `<tr>${row}</tr>`;
            }).join('');
            document.getElementById('tablePondWrap').innerHTML = `<table class="w-full text-[11px] border">
                <thead class="bg-slate-50"><tr><th class="p-2 border text-left">POND</th>${cols.map(c=>`<th class="p-2 border">${c}</th>`).join('')}</tr></thead>
                <tbody>${pBody}</tbody></table>`;

            // Cycle Comparison
            const allS = [...new Set(rawData.map(d => d.SIKLUS))].filter(Boolean);
            let sBody = allS.map(s => {
                const r = rawData.filter(row => row.SIKLUS === s);
                let row = `<td class="p-2 border text-left">${s}</td>`;
                cols.forEach(c => {
                    const v = r.reduce((a, b) => a + (parseFloat(b[c]) || 0), 0) / r.length;
                    row += `<td class="p-2 border text-center font-mono">${v.toFixed(2)}</td>`;
                });
                return `<tr class="${s === activeS ? 'bg-blue-50 font-black' : ''}">${row}</tr>`;
            }).join('');
            document.getElementById('tableSiklusWrap').innerHTML = `<table class="w-full text-[11px] border">
                <thead class="bg-slate-800 text-white"><tr><th class="p-2 border text-left">SIKLUS</th>${cols.map(c=>`<th class="p-2 border">${c} (AVG)</th>`).join('')}</tr></thead>
                <tbody>${sBody}</tbody></table>`;
        }

        function formatTgl(val) {
            if (!val) return "";
            if (val instanceof Date) return val.toLocaleDateString('id-ID', { day:'2-digit', month:'short' });
            return val;
        }
    </script>
</body>
</html>
